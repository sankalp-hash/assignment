apiVersion: apps/v1
kind: Deployment

metadata:
  name: assignment-nagp
  namespace: assignment

spec:
  replicas: 4

  selector:
    matchLabels:
      app: assignment-nagp

  template:
    metadata:
      labels:
        app: assignment-nagp

    spec:
      containers:
        - name: assignment-app

          image: us-central1-docker.pkg.dev/devops-assignment-500215/assignment-nagp/inventory-app:v1

          ports:
            - containerPort: 8080

#I want to specifically use rolling-update strategy for this yaml file. At a time
# I want to update 50% of the pods